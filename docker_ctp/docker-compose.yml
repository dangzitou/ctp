services:
  # ===== Kafka (KRaft mode, no Zookeeper) =====
  kafka:
    image: apache/kafka:latest
    container_name: ctp-kafka
    environment:
      # KRaft mode - no Zookeeper needed
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=CLIENT
      # Listeners
      - KAFKA_LISTENERS=CONTROLLER://:9093,CLIENT://:9092,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=CLIENT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
      # Ports
      - KAFKA_CONTROLLER_PORT=9093
      - KAFKA_NODE_ID=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
      - ALLOW_PLAINTEXT_LISTENER=true
    ports:
      - "${KAFKA_CLIENT_PORT}:9092"
      - "${KAFKA_EXTERNAL_PORT}:9094"
    networks: [ctp-net]
    healthcheck:
      test: ["CMD-SHELL", "bash /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:${KAFKA_CLIENT_PORT} --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===== MySQL =====
  mysql:
    image: mysql:8.0
    container_name: ctp-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=ctp123456
      - MYSQL_DATABASE=ctp_futures
      - MYSQL_USER=ctpuser
      - MYSQL_PASSWORD=ctp123456
    ports:
      - "${MYSQL_HOST_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [ctp-net]
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: ctp-redis
    ports:
      - "${REDIS_HOST_PORT}:6379"
    volumes:
      - redis-data:/data
    networks: [ctp-net]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ctp-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

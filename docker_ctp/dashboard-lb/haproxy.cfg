global
  log stdout format raw local0

defaults
  log global
  mode http
  timeout connect 5s
  timeout client 60s
  timeout server 60s

resolvers docker
  nameserver dns 127.0.0.11:53
  hold valid 2s

frontend dashboard_front
  bind *:8080
  default_backend dashboard_nodes

backend dashboard_nodes
  balance roundrobin
  option httpchk GET /api/stats
  http-check expect status 200
  server-template dashboard 5 dashboard:8080 check resolvers docker init-addr libc,none

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP Futures Dashboard - Real-time K-Line</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e14; --panel: #111827; --card: #1a2332;
            --border: #1e2a3a; --text: #e6edf3; --text2: #8b949e;
            --green: #00ff88; --red: #ff3366; --blue: #58a6ff;
            --yellow: #f0c040;
        }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); font-size: 13px; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { display: flex; align-items: center; padding: 0 20px; height: 52px; background: var(--panel); border-bottom: 1px solid var(--border); gap: 24px; }
        .logo { font-size: 18px; font-weight: 700; color: var(--green); letter-spacing: -0.5px; }
        .contract-info { display: flex; align-items: baseline; gap: 12px; }
        .symbol { font-size: 22px; font-weight: 600; color: var(--yellow); }
        .price { font-size: 26px; font-weight: 600; }
        .price.up { color: var(--green); } .price.down { color: var(--red); }
        .change { font-size: 14px; padding: 2px 8px; border-radius: 4px; }
        .change.up { background: rgba(0,255,136,0.15); color: var(--green); }
        .change.down { background: rgba(255,51,102,0.15); color: var(--red); }
        .stats { display: flex; gap: 16px; font-size: 11px; color: var(--text2); }
        .stat-label { font-size: 10px; color: #484f58; }
        .stat-val { font-size: 13px; }
        .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
        .dot.red { background: var(--red); }
        .dot.gray { background: #484f58; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .main { display: flex; flex: 1; overflow: hidden; }
        .left { width: 260px; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; }
        .search { padding: 10px; border-bottom: 1px solid var(--border); }
        .search input { width: 100%; padding: 7px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; outline: none; }
        .search input:focus { border-color: var(--blue); }
        .groups { padding: 8px 0; }
        .group-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .group-header:hover { background: var(--card); }
        .group-badge { padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
        .group-badge.shfe { background: rgba(88,166,255,0.2); color: var(--blue); }
        .group-badge.dce { background: rgba(0,255,136,0.2); color: var(--green); }
        .group-badge.czce { background: rgba(255,192,64,0.2); color: var(--yellow); }
        .group-badge.cffex { background: rgba(188,140,255,0.2); color: #bc8cff; }
        .group-badge.ine { background: rgba(255,51,102,0.2); color: var(--red); }
        .toggle { color: var(--text2); transition: transform 0.2s; }
        .toggle.down { transform: rotate(-90deg); }
        .inst-list { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .inst-list.open { max-height: 2000px; }
        .inst-item { display: flex; align-items: center; padding: 5px 12px 5px 20px; cursor: pointer; font-size: 12px; border-left: 2px solid transparent; transition: background 0.1s; }
        .inst-item:hover { background: var(--card); }
        .inst-item.selected { background: var(--card); border-left-color: var(--blue); }
        .inst-item.up { border-left-color: var(--green); }
        .inst-item.down { border-left-color: var(--red); }
        .iid { width: 70px; font-weight: 500; }
        .iprice { flex: 1; text-align: right; }
        .ichange { width: 54px; text-align: right; font-size: 10px; }
        .up { color: var(--green); } .down { color: var(--red); }
        .right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { display: flex; align-items: center; padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border); gap: 8px; }
        .period { padding: 4px 12px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit; }
        .period:hover { border-color: #484f58; color: var(--text); }
        .period.active { background: var(--blue); border-color: var(--blue); color: #000; }
        .chart-info { margin-left: auto; font-size: 11px; color: var(--text2); display: flex; gap: 12px; }
        .chart { flex: 1; padding: 8px; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text2); }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">FuturesHub</div>
        <div class="contract-info" id="contract-info" style="display:none">
            <span class="symbol" id="symbol">--</span>
            <span class="price up" id="price">--</span>
            <span class="change up" id="change">--</span>
        </div>
        <div class="stats" id="stats" style="display:none">
            <div><div class="stat-label">Volume</div><div class="stat-val" id="s-vol">--</div></div>
            <div><div class="stat-label">OpenInterest</div><div class="stat-val" id="s-oi">--</div></div>
            <div><div class="stat-label">Bid</div><div class="stat-val" id="s-bid">--</div></div>
            <div><div class="stat-label">Ask</div><div class="stat-val" id="s-ask">--</div></div>
        </div>
        <div class="status">
            <div class="dot gray" id="ws-dot"></div>
            <span id="ws-status">Connecting...</span>
        </div>
    </div>
    <div class="main">
        <aside class="left">
            <div class="search">
                <input type="text" id="search" placeholder="搜索合约...">
            </div>
            <div class="groups" id="groups"></div>
        </aside>
        <main class="right">
            <div class="toolbar">
                <button class="period active" data-p="1min">1M</button>
                <button class="period" data-p="5min">5M</button>
                <button class="period" data-p="15min">15M</button>
                <button class="period" data-p="30min">30M</button>
                <button class="period" data-p="1hour">1H</button>
                <button class="period" data-p="1day">1D</button>
                <div class="chart-info">
                    <span id="candles-count">0 candles</span>
                    <span id="chart-range">--</span>
                </div>
            </div>
            <div class="chart">
                <div id="kline" style="width:100%;height:100%"></div>
            </div>
        </main>
    </div>
</div>

<script>
// ============ State ============
const EXCHANGES = {
    SHFE: { name: '上海期货', cls: 'shfe' },
    DCE: { name: '大连商品', cls: 'dce' },
    CZCE: { name: '郑州商品', cls: 'czce' },
    CFFEX: { name: '中金所', cls: 'cffex' },
    INE: { name: '能源中心', cls: 'ine' }
};
const WS_URL = `ws://${location.host}/ws/ticks`;
const API_BASE = `http://${location.host}`;

let ws = null;
let tickMap = {};      // iid -> tick
let selected = null;
let currentPeriod = '1min';
let klineData = {};    // iid -> [candles]
let chart = null;
let searchTerm = '';

// ============ WebSocket ============
function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
        document.getElementById('ws-dot').className = 'dot green';
        document.getElementById('ws-status').textContent = 'Connected';
    };
    ws.onmessage = (e) => {
        try {
            const tick = JSON.parse(e.data);
            onTick(tick);
        } catch {}
    };
    ws.onclose = () => {
        document.getElementById('ws-dot').className = 'dot red';
        document.getElementById('ws-status').textContent = 'Disconnected, retrying...';
        setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
}

function onTick(tick) {
    tickMap[tick.instrumentId] = tick;
    updateInstItem(tick);
    if (selected === tick.instrumentId) {
        updateHeader(tick);
        updateKline(tick);
    }
}

function updateHeader(tick) {
    const p = document.getElementById('price');
    const c = document.getElementById('change');
    const isUp = tick.change >= 0;
    p.textContent = tick.price?.toFixed(2) || '--';
    p.className = `price ${isUp ? 'up' : 'down'}`;
    c.textContent = `${isUp ? '+' : ''}${(tick.change || 0).toFixed(2)} (${isUp ? '+' : ''}${(tick.changePct || 0).toFixed(2)}%)`;
    c.className = `change ${isUp ? 'up' : 'down'}`;
    document.getElementById('s-vol').textContent = fmtNum(tick.volume);
    document.getElementById('s-oi').textContent = fmtNum(tick.openInterest);
    document.getElementById('s-bid').textContent = tick.bid?.toFixed(2) || '--';
    document.getElementById('s-ask').textContent = tick.ask?.toFixed(2) || '--';
}

function fmtNum(n) {
    if (!n) return '--';
    if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
    if (n >= 1000) return (n/1000).toFixed(2) + 'K';
    return String(n);
}

// ============ Instrument List ============
async function loadInstruments() {
    const resp = await fetch(`${API_BASE}/api/instruments`);
    const data = await resp.json();
    // Pre-fill all known
    if (data.length === 0) {
        // Load from static list
        await loadStaticList();
        return;
    }
    data.forEach(t => tickMap[t.instrument_id] = t);
    renderGroups(data);
    // Auto-select first
    if (data.length > 0 && !selected) {
        selectInst(data[0].instrument_id);
    }
}

async function loadStaticList() {
    // Hardcoded full list
    const all = [
        'rb2605','rb2606','rb2607','rb2608','rb2609','rb2610','rb2611','rb2612',
        'hc2605','hc2606','hc2607','hc2608','hc2609','hc2610','hc2611','hc2612',
        'i2605','i2606','i2607','i2608','i2609','i2610','i2611','i2612',
        'j2605','j2606','j2607','j2608','j2609','j2610','j2611','j2612',
        'jm2605','jm2606','jm2607','jm2608','jm2609','jm2610','jm2611','jm2612',
        'cu2605','cu2606','cu2607','cu2608','cu2609','cu2610','cu2611','cu2612',
        'al2605','al2606','al2607','al2608','al2609','al2610','al2611','al2612',
        'zn2605','zn2606','zn2607','zn2608','zn2609','zn2610','zn2611','zn2612',
        'pb2605','pb2606','pb2607','pb2608','pb2609','pb2610','pb2611','pb2612',
        'ni2605','ni2606','ni2607','ni2608','ni2609','ni2610','ni2611','ni2612',
        'sn2605','sn2606','sn2607','sn2608','sn2609','sn2610','sn2611','sn2612',
        'ss2605','ss2606','ss2607','ss2608','ss2609','ss2610','ss2611','ss2612',
        'au2604','au2606','au2608','au2610','au2612',
        'ag2604','ag2606','ag2608','ag2610','ag2612',
        'ru2605','ru2606','ru2607','ru2608','ru2609','ru2610','ru2611','ru2612',
        'bu2605','bu2606','bu2607','bu2608','bu2609','bu2610','bu2611','bu2612',
        'sc2605','sc2606','sc2607','sc2608','sc2609','sc2610','sc2611','sc2612',
        'pg2605','pg2606','pg2607','pg2608','pg2609','pg2610','pg2611','pg2612',
        'eb2605','eb2606','eb2607','eb2608','eb2609','eb2610','eb2611','eb2612',
        'eg2605','eg2606','eg2607','eg2608','eg2609','eg2610','eg2611','eg2612',
        'ma2605','ma2607','ma2609','ma2611',
        'ta2605','ta2607','ta2609','ta2611',
        'fg2605','fg2607','fg2609','fg2611',
        'pf2605','pf2607','pf2609','pf2611',
        'rm2605','rm2607','rm2609','rm2611',
        'sr2605','sr2607','sr2609','sr2611',
        'cf2605','cf2607','cf2609','cf2611',
        'cy2605','cy2607','cy2609','cy2611',
        'oi2605','oi2607','oi2609','oi2611',
        'wh2605','wh2607','wh2609','wh2611',
        'pm2605','pm2607','pm2609','pm2611',
        'm2605','m2607','m2608','m2609','m2611','m2612',
        'y2605','y2607','y2608','y2609','y2611','y2612',
        'c2605','c2607','c2609','c2611','c2612',
        'cs2605','cs2607','cs2609','cs2611','cs2612',
        'p2605','p2607','p2608','p2609','p2610','p2611',
        'a2605','a2607','a2609','a2611',
        'b2605','b2607','b2609','b2611',
        'l2605','l2607','l2608','l2609','l2611','l2612',
        'pp2605','pp2606','pp2607','pp2608','pp2609','pp2610','pp2611','pp2612',
        'v2605','v2607','v2608','v2609','v2611','v2612',
        'if2604','if2605','if2606','if2609',
        'ih2604','ih2605','ih2606','ih2609',
        'ic2604','ic2605','ic2606','ic2609',
        'im2604','im2605','im2606','im2609',
        'tf2606','tf2609','tf2612',
        'ts2606','ts2609','ts2612',
        't2606','t2609','t2612',
    ];
    const byEx = { SHFE:[], DCE:[], CZCE:[], CFFEX:[], INE:[] };
    const EX_SUF = {
        SHFE:['cu','al','zn','pb','ni','sn','ss','au','ag','ru','bu','rb','hc','i','j','jm'],
        DCE:['m','y','c','cs','p','a','b','l','pp','v','eb','eg','pg'],
        CZCE:['ma','ta','fg','pf','rm','sr','cf','cy','oi','wh','pm'],
        CFFEX:['if','ih','ic','im','tf','ts','t'],
        INE:['sc','bc']
    };
    all.forEach(iid => {
        const suf = iid.replace(/[0-9]/g,'').toLowerCase();
        for (const [ex,prefs] of Object.entries(EX_SUF)) {
            if (prefs.includes(suf)) { byEx[ex].push(iid); break; }
        }
    });
    renderStaticGroups(byEx);
    if (all.length > 0 && !selected) selectInst(all[0]);
}

function renderGroups(data) {
    const byEx = {};
    data.forEach(t => {
        const ex = t.exchange || getExchange(t.instrument_id);
        if (!byEx[ex]) byEx[ex] = [];
        byEx[ex].push(t);
    });
    const container = document.getElementById('groups');
    container.innerHTML = '';
    Object.entries(EXCHANGES).forEach(([code, info]) => {
        const items = byEx[code] || [];
        if (items.length === 0) return;
        const filtered = searchTerm ? items.filter(t =>
            t.instrument_id.toLowerCase().includes(searchTerm.toLowerCase())) : items;
        if (filtered.length === 0) return;
        container.appendChild(makeGroup(code, info, filtered));
    });
}

function renderStaticGroups(byEx) {
    const container = document.getElementById('groups');
    container.innerHTML = '';
    Object.entries(EXCHANGES).forEach(([code, info]) => {
        let items = byEx[code] || [];
        if (!items.length) return;
        if (searchTerm) items = items.filter(i => i.toLowerCase().includes(searchTerm.toLowerCase()));
        if (!items.length) return;
        const ticks = items.map(iid => tickMap[iid] || { instrument_id: iid, exchange: code, price: 0, change: 0, changePct: 0 });
        container.appendChild(makeGroup(code, info, ticks));
    });
}

function makeGroup(code, info, items) {
    const div = document.createElement('div');
    div.className = 'group';
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `<span><span class="group-badge ${info.cls}">${code}</span> ${info.name}</span><span class="toggle">▼</span>`;
    hdr.onclick = () => {
        const list = hdr.nextElementSibling;
        const tog = hdr.querySelector('.toggle');
        list.classList.toggle('open');
        tog.classList.toggle('down');
    };
    const list = document.createElement('div');
    list.className = 'inst-list open';
    items.forEach(t => {
        const item = document.createElement('div');
        item.className = 'inst-item' + (selected === t.instrument_id ? ' selected' : '');
        item.dataset.iid = t.instrument_id;
        const isUp = (t.change || 0) >= 0;
        if ((t.change || 0) !== 0) item.classList.add(isUp ? 'up' : 'down');
        item.innerHTML = `<span class="iid">${t.instrument_id}</span><span class="iprice ${isUp ? 'up' : 'down'}">${(t.price || 0) > 0 ? t.price.toFixed(2) : '--'}</span><span class="ichange ${isUp ? 'up' : 'down'}">${(t.changePct || 0) >= 0 ? '+' : ''}${(t.changePct || 0).toFixed(2)}%</span>`;
        item.onclick = () => selectInst(t.instrument_id);
        list.appendChild(item);
    });
    div.appendChild(hdr);
    div.appendChild(list);
    return div;
}

function updateInstItem(tick) {
    const item = document.querySelector(`.inst-item[data-iid="${tick.instrumentId}"]`);
    if (!item) return;
    const isUp = tick.change >= 0;
    item.className = `inst-item selected ${isUp ? 'up' : 'down'}`;
    item.querySelector('.iprice').textContent = tick.price > 0 ? tick.price.toFixed(2) : '--';
    item.querySelector('.iprice').className = `iprice ${isUp ? 'up' : 'down'}`;
    item.querySelector('.ichange').textContent = `${tick.changePct >= 0 ? '+' : ''}${(tick.changePct || 0).toFixed(2)}%`;
    item.querySelector('.ichange').className = `ichange ${isUp ? 'up' : 'down'}`;
}

function selectInst(iid) {
    selected = iid;
    document.querySelectorAll('.inst-item').forEach(el => el.classList.remove('selected'));
    const el = document.querySelector(`.inst-item[data-iid="${iid}"]`);
    if (el) el.classList.add('selected');
    document.getElementById('contract-info').style.display = 'flex';
    document.getElementById('stats').style.display = 'flex';
    document.getElementById('symbol').textContent = iid;
    const tick = tickMap[iid];
    if (tick) updateHeader(tick);
    loadKline(iid);
}

async function loadKline(iid) {
    try {
        const resp = await fetch(`${API_BASE}/api/kline/${iid}`);
        const data = await resp.json();
        klineData[iid] = data;
        renderChart(data);
    } catch (e) {
        // No kline data yet
        if (chart) chart.setOption({ series: [{ data: [] }] });
    }
}

function updateKline(tick) {
    if (!selected || tick.instrumentId !== selected) return;
    const ts = Math.floor(Date.now() / 1000);
    const minTs = Math.floor(ts / 60) * 60;
    let candles = klineData[selected] || [];
    if (candles.length === 0 || candles[candles.length-1][0] < minTs * 1000) {
        candles = [...candles, [minTs*1000, tick.price, tick.price, tick.price, tick.price, tick.volume]];
    } else {
        const c = candles[candles.length-1];
        c[2] = Math.max(c[2], tick.price);
        c[3] = Math.min(c[3], tick.price);
        c[4] = tick.price;
        c[5] = (c[5] || 0) + tick.volume;
    }
    klineData[selected] = candles;
    renderChart(candles);
}

// ============ Chart ============
function initChart() {
    chart = echarts.init(document.getElementById('kline'), 'dark');
    const opt = {
        backgroundColor: 'transparent',
        animation: false,
        tooltip: {
            trigger: 'axis', axisPointer: { type: 'cross' },
            backgroundColor: 'rgba(17,24,39,0.95)', borderColor: '#1e2a3a',
            textStyle: { color: '#e6edf3', fontFamily: 'JetBrains Mono', fontSize: 11 }
        },
        grid: { left: 60, right: 20, top: 20, bottom: 60 },
        xAxis: { type: 'time', axisLine: { lineStyle: { color: '#1e2a3a' } },
            axisLabel: { color: '#484f58', fontFamily: 'JetBrains Mono', fontSize: 10 },
            splitLine: { show: false } },
        yAxis: { scale: true, position: 'right',
            axisLine: { lineStyle: { color: '#1e2a3a' } },
            axisLabel: { color: '#484f58', fontFamily: 'JetBrains Mono', fontSize: 10 },
            splitLine: { lineStyle: { color: '#1e2a3a', type: 'dashed' } } },
        dataZoom: [
            { type: 'inside', xAxisIndex: 0, start: 70, end: 100 },
            { type: 'slider', xAxisIndex: 0, start: 70, end: 100, height: 20, bottom: 10,
              borderColor: '#1e2a3a', backgroundColor: '#0d1117',
              fillerColor: 'rgba(88,166,255,0.2)', handleStyle: { color: '#58a6ff' },
              textStyle: { color: '#484f58' } }
        ],
        series: [
            { type: 'candlestick', name: 'KLine', data: [],
              itemStyle: { color: '#00ff88', color0: '#ff3366', borderColor: '#00ff88', borderColor0: '#ff3366' }
            },
            { type: 'line', name: 'MA5', data: [], smooth: true, symbol: 'none',
              lineStyle: { color: '#f0c040', width: 1, opacity: 0.7 } },
            { type: 'line', name: 'MA10', data: [], smooth: true, symbol: 'none',
              lineStyle: { color: '#58a6ff', width: 1, opacity: 0.7 } }
        ]
    };
    chart.setOption(opt);
    window.addEventListener('resize', () => chart.resize());
}

function renderChart(candles) {
    if (!chart || !candles.length) return;
    const closes = candles.map(c => c[4]);
    const ma5 = calcMA(closes, 5);
    const ma10 = calcMA(closes, 10);
    const ma5d = ma5.map((v,i) => [candles[i][0], v]);
    const ma10d = ma10.map((v,i) => [candles[i][0], v]);
    chart.setOption({
        series: [
            { data: candles.map(c => [c[0],c[1],c[2],c[3],c[4]]) },
            { data: ma5d }, { data: ma10d }
        ]
    });
    document.getElementById('candles-count').textContent = `${candles.length} candles`;
}

function calcMA(closes, n) {
    return closes.map((_, i) => i < n-1 ? null : closes.slice(i-n+1, i+1).reduce((a,b) => a+b, 0)/n);
}

function getExchange(iid) {
    const suf = iid.replace(/[0-9]/g,'').toLowerCase();
    const m = {cu:'SHFE',al:'SHFE',zn:'SHFE',pb:'SHFE',ni:'SHFE',sn:'SHFE',ss:'SHFE',au:'SHFE',ag:'SHFE',ru:'SHFE',bu:'SHFE',rb:'SHFE',hc:'SHFE',i:'SHFE',j:'SHFE',jm:'SHFE',
        m:'DCE',y:'DCE',c:'DCE',cs:'DCE',p:'DCE',a:'DCE',b:'DCE',l:'DCE',pp:'DCE',v:'DCE',eb:'DCE',eg:'DCE',pg:'DCE',

// ============ Search ============
document.getElementById('search').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    if (Object.keys(tickMap).length > 0) {
        const data = Object.values(tickMap).map(t => ({ instrument_id: t.instrumentId || t.instrument_id, exchange: t.exchange || getExchange(t.instrumentId||t.instrument_id), price: t.price, change: t.change, changePct: t.changePct }));
        renderGroups(data);
    } else {
        loadStaticList();
    }
});

// ============ Period buttons ============
document.querySelectorAll('.period').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.period').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPeriod = btn.dataset.p;
        if (selected) loadKline(selected);
    });
});

// ============ Init ============
document.addEventListener('DOMContentLoaded', () => {
    initChart();
    connect();
    loadInstruments();
});

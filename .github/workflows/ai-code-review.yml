name: AI Code Review

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
    paths-ignore:
      - "openctp/**"
      - "ctpapi_python_6.7.11/**"
      - "tts_6.7.11/**"
      - "tap_6.7.2/**"
      - "*.zip"
      - "*.dll"
      - "*.pyd"
      - "*.jar"
      - "*.class"
      - "*.con"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: ai-code-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-diff:
    if: >
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          !startsWith(github.event.head_commit.message, 'chore(ai): 自动修复') &&
          !startsWith(github.event.head_commit.message, 'AI 自动修复:') &&
          !startsWith(github.event.head_commit.message, 'chore(ai): auto-fix')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - name: Prepare review payload
        env:
          AI_REVIEW_MAX_FILES: ${{ vars.AI_REVIEW_MAX_FILES }}
          AI_REVIEW_MAX_PATCH_CHARS: ${{ vars.AI_REVIEW_MAX_PATCH_CHARS }}
        run: python -m tools.ai_review.review_push prepare --output .ai/review-payload.json
      - uses: actions/upload-artifact@v4
        with:
          name: review-payload
          path: .ai/review-payload.json

  prepare-mcp-context:
    needs: prepare-diff
    if: needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - name: Build MCP review context
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_REVIEW_GH_TOKEN: ${{ secrets.AI_REVIEW_GH_TOKEN }}
          AI_REVIEW_ENABLE_MCP: ${{ vars.AI_REVIEW_ENABLE_MCP || 'true' }}
          AI_REVIEW_MCP_MODE: ${{ vars.AI_REVIEW_MCP_MODE || 'prefetch' }}
          AI_REVIEW_MCP_RELATED_FILE_LIMIT: ${{ vars.AI_REVIEW_MCP_RELATED_FILE_LIMIT || '12' }}
          AI_REVIEW_MCP_ISSUE_LOOKBACK_DAYS: ${{ vars.AI_REVIEW_MCP_ISSUE_LOOKBACK_DAYS || '30' }}
          AI_REVIEW_MCP_PR_LOOKBACK_DAYS: ${{ vars.AI_REVIEW_MCP_PR_LOOKBACK_DAYS || '30' }}
          AI_REVIEW_MCP_ENABLE_WEB_SEARCH: ${{ vars.AI_REVIEW_MCP_ENABLE_WEB_SEARCH || 'true' }}
        run: python -m tools.ai_review.mcp_context review --input .ai/review-payload.json --output .ai/review-context.json
      - uses: actions/upload-artifact@v4
        with:
          name: review-context
          path: .ai/review-context.json
          if-no-files-found: warn

  review-code:
    needs:
      - prepare-diff
      - prepare-mcp-context
    if: needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: review-context
          path: .ai
      - name: Run code reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: python -m tools.ai_review.review_push review --role code --input .ai/review-payload.json --context .ai/review-context.json --output .ai/review-code.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-code
          path: .ai/review-code.json
          if-no-files-found: warn

  review-security:
    needs:
      - prepare-diff
      - prepare-mcp-context
    if: needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: review-context
          path: .ai
      - name: Run security reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: python -m tools.ai_review.review_push review --role security --input .ai/review-payload.json --context .ai/review-context.json --output .ai/review-security.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-security
          path: .ai/review-security.json
          if-no-files-found: warn

  review-docs-runtime:
    needs:
      - prepare-diff
      - prepare-mcp-context
    if: needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: review-context
          path: .ai
      - name: Run docs/runtime reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: python -m tools.ai_review.review_push review --role docs-runtime --input .ai/review-payload.json --context .ai/review-context.json --output .ai/review-docs-runtime.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-docs-runtime
          path: .ai/review-docs-runtime.json
          if-no-files-found: warn

  review-coordinator:
    needs:
      - prepare-diff
      - prepare-mcp-context
      - review-code
      - review-security
      - review-docs-runtime
    if: always() && needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          path: .ai-artifacts
      - name: Arrange artifact files
        shell: bash
        run: |
          mkdir -p .ai
          cp .ai-artifacts/review-payload/review-payload.json .ai/review-payload.json
          cp .ai-artifacts/review-context/review-context.json .ai/review-context.json
          [ -f .ai-artifacts/review-code/review-code.json ] && cp .ai-artifacts/review-code/review-code.json .ai/review-code.json || true
          [ -f .ai-artifacts/review-security/review-security.json ] && cp .ai-artifacts/review-security/review-security.json .ai/review-security.json || true
          [ -f .ai-artifacts/review-docs-runtime/review-docs-runtime.json ] && cp .ai-artifacts/review-docs-runtime/review-docs-runtime.json .ai/review-docs-runtime.json || true
      - name: Run coordinator
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python -m tools.ai_review.review_push coordinate
          --input .ai/review-payload.json
          --context .ai/review-context.json
          --review .ai/review-code.json
          --review .ai/review-security.json
          --review .ai/review-docs-runtime.json
          --output-report .ai/final-review.md
          --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-final-report
          path: .ai/final-review.md
          if-no-files-found: warn

  validate-auto-fix:
    needs:
      - prepare-diff
      - prepare-mcp-context
      - review-coordinator
    if: always() && needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: review-context
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: review-final-report
          path: .ai
      - name: Run AI auto-fix
        if: needs.review-coordinator.result == 'success'
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: >
          python -m tools.ai_review.auto_fix apply
          --input .ai/review-payload.json
          --context .ai/review-context.json
          --report .ai/final-review.md
          --output .ai/auto-fix.json
          --summary-output .ai/auto-fix-summary.md
      - name: Create degraded auto-fix metadata when review failed
        if: needs.review-coordinator.result != 'success'
        shell: bash
        run: |
          mkdir -p .ai
          cat > .ai/auto-fix.json <<'JSON'
          {
            "ok": false,
            "changed": false,
            "summary": "自动修复未执行：review-coordinator 未成功。",
            "root_cause_guess": "",
            "evidence_sources": [],
            "changes": [],
            "changed_files": [],
            "risk_level": "",
            "auto_fix_allowed": false,
            "auto_merge_allowed": false,
            "blocked_reason": "review-coordinator failed",
            "reason": "review-coordinator failed",
            "blocked_auto_fix_paths": [],
            "blocked_auto_merge_paths": [],
            "path_policies": [],
            "gates": []
          }
          JSON
          printf "自动修复未执行：review-coordinator 未成功。\n" > .ai/auto-fix-summary.md
      - name: Validate auto-fix gates
        continue-on-error: true
        run: >
          python -m tools.ai_review.validate_auto_fix run
          --fix .ai/auto-fix.json
          --payload .ai/review-payload.json
          --output .ai/auto-fix-validation.json
      - name: Upload auto-fix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-auto-fix
          path: |
            .ai/auto-fix.json
            .ai/auto-fix-summary.md
          if-no-files-found: warn
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-auto-fix-validation
          path: .ai/auto-fix-validation.json
          if-no-files-found: warn

  auto-fix:
    needs:
      - prepare-diff
      - prepare-mcp-context
      - review-coordinator
      - validate-auto-fix
    if: always() && needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: review-auto-fix
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: review-auto-fix-validation
          path: .ai
      - name: Materialize auto-fix changes
        shell: bash
        run: python -m tools.ai_review.auto_fix materialize --input .ai/auto-fix.json
      - name: Prepare auto-fix branch
        id: prepare_fix_branch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FIX_BRANCH="ai/auto-fix/${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$FIX_BRANCH"
          git add -A
          git commit -m "chore(ai): 自动修复 review 发现的问题"
          git push --force origin "$FIX_BRANCH"
          {
            echo "changed=true"
            echo "fix_branch=$FIX_BRANCH"
          } >> "$GITHUB_OUTPUT"
      - name: Prepare PR metadata
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          fix = json.loads(Path('.ai/auto-fix.json').read_text(encoding='utf-8'))
          validation = json.loads(Path('.ai/auto-fix-validation.json').read_text(encoding='utf-8'))
          safe = bool(validation.get('auto_merge_allowed'))
          merge_reason = str(validation.get('reason') or '').strip() or 'Validation did not provide an explicit reason.'
          gates = validation.get('gates') or []
          lines = [
              '## 自动修复上下文',
              f"- 根因猜测: {fix.get('root_cause_guess') or 'n/a'}",
              f"- 证据来源: {', '.join(fix.get('evidence_sources') or []) or 'n/a'}",
              f"- 修改文件数: {len(fix.get('changed_files') or [])}",
              '',
              '## 验证门禁摘要',
              f"- 风险等级: `{validation.get('risk_level', 'unknown')}`",
              f"- 允许自动修复: `{validation.get('auto_fix_allowed', False)}`",
              f"- 允许自动合并: `{safe}`",
              f"- 判定依据: {merge_reason}",
              '',
              '## Gate 明细',
          ]
          if gates:
              for gate in gates:
                  lines.append(
                      f"- `{gate.get('gate_name', 'unknown')}`: `{gate.get('status', 'unknown')}` | required=`{gate.get('required', False)}` | {gate.get('details', '')}"
                  )
          else:
              lines.append('- 无 gate 输出。')
          Path('.ai/safe-to-automerge.txt').write_text(('true' if safe else 'false') + '\n', encoding='utf-8')
          Path('.ai/merge-reason.txt').write_text(merge_reason + '\n', encoding='utf-8')
          Path('.ai/auto-fix-validation-summary.md').write_text('\n'.join(lines).rstrip() + '\n', encoding='utf-8')
          PY
      - name: Build auto-fix PR body
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        shell: bash
        run: |
          {
            echo "本 PR 由 AI 代码审查 workflow 自动生成，用于修复本次审查中识别出的明确问题。"
            echo
            echo "来源："
            echo "- 仓库：\`${GITHUB_REPOSITORY}\`"
            echo "- 分支：\`${GITHUB_REF_NAME}\`"
            echo "- 提交：\`${GITHUB_SHA}\`"
            echo "- Workflow：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            cat .ai/auto-fix-summary.md
            echo
            cat .ai/auto-fix-validation-summary.md
          } > .ai/auto-fix-pr-body.md
      - name: Decide merge mode
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        id: decide_merge_mode
        shell: bash
        run: |
          python -c "from pathlib import Path; safe=Path('.ai/safe-to-automerge.txt').read_text(encoding='utf-8').strip().lower() == 'true'; Path('.ai/merge-mode.txt').write_text(('squash' if safe else 'none') + '\n', encoding='utf-8')"
          echo "merge_mode=$(cat .ai/merge-mode.txt)" >> "$GITHUB_OUTPUT"
      - name: Create auto-fix pull request
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        env:
          AI_REVIEW_GH_TOKEN: ${{ secrets.AI_REVIEW_GH_TOKEN }}
          AUTO_FIX_GITHUB_TOKEN: ${{ secrets.AI_AUTOFIX_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          export GITHUB_TOKEN="${AI_REVIEW_GH_TOKEN:-${AUTO_FIX_GITHUB_TOKEN:-$GITHUB_TOKEN}}"
          pr_args=()
          if [ "$(cat .ai/safe-to-automerge.txt)" = "true" ]; then
            pr_args+=(--safe-to-automerge)
          fi
          python -m tools.ai_review.open_fix_pr \
            --title "chore(ai): 自动修复 ${GITHUB_REF_NAME} @ ${GITHUB_SHA}" \
            --body-file .ai/auto-fix-pr-body.md \
            --head "${{ steps.prepare_fix_branch.outputs.fix_branch }}" \
            --base "${{ github.ref_name }}" \
            --merge-mode "${{ steps.decide_merge_mode.outputs.merge_mode }}" \
            --merge-reason "$(cat .ai/merge-reason.txt)" \
            --json-output .ai/auto-fix-pr.json \
            "${pr_args[@]}"
      - name: Create degraded PR metadata when no branch was pushed
        if: always() && steps.prepare_fix_branch.outputs.changed != 'true'
        shell: bash
        run: |
          cat > .ai/auto-fix-pr.json <<'JSON'
          {
            "ok": true,
            "pr_created": false,
            "pr_number": null,
            "pr_url": "",
            "compare_url": "",
            "merge_requested": false,
            "merge_status": "not_requested",
            "labels": ["automation", "triage"],
            "runtime_fix": false,
            "safe_to_automerge": false,
            "merge_reason": ""
          }
          JSON
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-auto-fix-pr
          path: .ai/auto-fix-pr.json
          if-no-files-found: warn

  publish-review-issue:
    needs:
      - prepare-diff
      - prepare-mcp-context
      - review-code
      - review-security
      - review-docs-runtime
      - review-coordinator
      - validate-auto-fix
      - auto-fix
    if: always() && needs.prepare-diff.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          path: .ai-artifacts
      - name: Arrange review artifacts
        shell: bash
        run: |
          mkdir -p .ai
          cp .ai-artifacts/review-payload/review-payload.json .ai/review-payload.json
          cp .ai-artifacts/review-context/review-context.json .ai/review-context.json
          [ -f .ai-artifacts/review-code/review-code.json ] && cp .ai-artifacts/review-code/review-code.json .ai/review-code.json || true
          [ -f .ai-artifacts/review-security/review-security.json ] && cp .ai-artifacts/review-security/review-security.json .ai/review-security.json || true
          [ -f .ai-artifacts/review-docs-runtime/review-docs-runtime.json ] && cp .ai-artifacts/review-docs-runtime/review-docs-runtime.json .ai/review-docs-runtime.json || true
          [ -f .ai-artifacts/review-final-report/final-review.md ] && cp .ai-artifacts/review-final-report/final-review.md .ai/final-review.md || true
          [ -f .ai-artifacts/review-auto-fix/auto-fix.json ] && cp .ai-artifacts/review-auto-fix/auto-fix.json .ai/auto-fix.json || true
          [ -f .ai-artifacts/review-auto-fix-validation/auto-fix-validation.json ] && cp .ai-artifacts/review-auto-fix-validation/auto-fix-validation.json .ai/auto-fix-validation.json || true
          [ -f .ai-artifacts/review-auto-fix-pr/auto-fix-pr.json ] && cp .ai-artifacts/review-auto-fix-pr/auto-fix-pr.json .ai/auto-fix-pr.json || true
      - name: Build review audit artifact
        run: >
          python -m tools.ai_review.build_audit_artifact review
          --payload .ai/review-payload.json
          --context .ai/review-context.json
          --review .ai/review-code.json
          --review .ai/review-security.json
          --review .ai/review-docs-runtime.json
          --report .ai/final-review.md
          --fix .ai/auto-fix.json
          --validation .ai/auto-fix-validation.json
          --pr .ai/auto-fix-pr.json
          --output .ai/review-audit.json
      - name: Publish review issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python -m tools.ai_review.publish_review_issue
          --report-file .ai/final-review.md
          --review-status "${{ needs.review-coordinator.result }}"
          --auto-fix-status "${{ needs.auto-fix.result }}"
          --audit-file .ai/review-audit.json
      - if: always() && vars.AI_REVIEW_AUDIT_ARTIFACT != 'false' && vars.AI_REVIEW_AUDIT_ARTIFACT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: review-audit
          path: |
            .ai/review-audit.json
            .ai/review-context.json
          if-no-files-found: warn

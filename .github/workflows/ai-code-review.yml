name: AI Code Review

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
    paths-ignore:
      - "openctp/**"
      - "ctpapi_python_6.7.11/**"
      - "tts_6.7.11/**"
      - "tap_6.7.2/**"
      - "*.zip"
      - "*.dll"
      - "*.pyd"
      - "*.jar"
      - "*.class"
      - "*.con"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ai-code-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-diff:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install review dependencies
        run: python -m pip install --upgrade pip openai

      - name: Prepare review payload
        env:
          AI_REVIEW_MAX_FILES: ${{ vars.AI_REVIEW_MAX_FILES }}
          AI_REVIEW_MAX_PATCH_CHARS: ${{ vars.AI_REVIEW_MAX_PATCH_CHARS }}
        run: python -m tools.ai_review.review_push prepare --output .ai/review-payload.json

      - name: Upload review payload
        uses: actions/upload-artifact@v4
        with:
          name: review-payload
          path: .ai/review-payload.json

  review-code:
    needs: prepare-diff
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - name: Run code reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: python -m tools.ai_review.review_push review --role code --input .ai/review-payload.json --output .ai/review-code.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-code
          path: .ai/review-code.json

  review-security:
    needs: prepare-diff
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - name: Run security reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: python -m tools.ai_review.review_push review --role security --input .ai/review-payload.json --output .ai/review-security.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-security
          path: .ai/review-security.json

  review-docs-runtime:
    needs: prepare-diff
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - name: Run docs/runtime reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: python -m tools.ai_review.review_push review --role docs-runtime --input .ai/review-payload.json --output .ai/review-docs-runtime.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-docs-runtime
          path: .ai/review-docs-runtime.json

  review-coordinator:
    needs:
      - prepare-diff
      - review-code
      - review-security
      - review-docs-runtime
    if: always() && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai
      - uses: actions/download-artifact@v4
        with:
          path: .ai-artifacts
      - name: Arrange artifact files
        shell: bash
        run: |
          mkdir -p .ai
          cp .ai-artifacts/review-payload/review-payload.json .ai/review-payload.json
          [ -f .ai-artifacts/review-code/review-code.json ] && cp .ai-artifacts/review-code/review-code.json .ai/review-code.json || true
          [ -f .ai-artifacts/review-security/review-security.json ] && cp .ai-artifacts/review-security/review-security.json .ai/review-security.json || true
          [ -f .ai-artifacts/review-docs-runtime/review-docs-runtime.json ] && cp .ai-artifacts/review-docs-runtime/review-docs-runtime.json .ai/review-docs-runtime.json || true
      - name: Run coordinator
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python -m tools.ai_review.review_push coordinate
          --input .ai/review-payload.json
          --review .ai/review-code.json
          --review .ai/review-security.json
          --review .ai/review-docs-runtime.json
          --output-report .ai/final-review.md
          --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-final-report
          path: .ai/final-review.md
          if-no-files-found: warn

  notify-email:
    needs:
      - prepare-diff
      - review-coordinator
      - auto-fix
    if: always() && github.actor != 'github-actions[bot]' && vars.AI_REVIEW_MAIL_TO != ''
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ vars.SMTP_USE_TLS }}
      MAIL_FROM: ${{ vars.AI_REVIEW_MAIL_FROM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: review-final-report
          path: .ai
      - name: Build Chinese email body
        shell: bash
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SERVER_URL: ${{ github.server_url }}
          STATUS: ${{ needs.review-coordinator.result }}
        run: |
          {
            echo "CTP AI 代码审查通知"
            echo
            echo "仓库: ${REPO}"
            echo "分支: ${REF_NAME}"
            echo "提交: ${SHA}"
            echo "执行状态: ${STATUS}"
            echo "Commit 链接: ${SERVER_URL}/${REPO}/commit/${SHA}"
            echo "Workflow 链接: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}/attempts/${RUN_ATTEMPT}"
            echo
            echo "自动修复状态: ${{ needs.auto-fix.result }}"
            echo
            echo "以下为本次中文审查结果："
            echo
            cat .ai/final-review.md
          } > .ai/review-email.txt
      - name: Check email configuration
        shell: bash
        run: |
          [ -n "${SMTP_HOST}" ] || { echo "SMTP_HOST is not configured"; exit 1; }
          [ -n "${SMTP_USERNAME}" ] || { echo "SMTP_USERNAME is not configured"; exit 1; }
          [ -n "${SMTP_PASSWORD}" ] || { echo "SMTP_PASSWORD is not configured"; exit 1; }
      - name: Send Chinese email
        run: >
          python -m tools.ai_review.send_email
          --subject "【CTP代码审查】${{ github.repository }}@${{ github.ref_name }} 审查完成"
          --body-file .ai/review-email.txt
          --to "${{ vars.AI_REVIEW_MAIL_TO }}"

  auto-fix:
    needs:
      - prepare-diff
      - review-coordinator
    if: needs.review-coordinator.result == 'success' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai
      - uses: actions/download-artifact@v4
        with:
          name: review-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: review-final-report
          path: .ai
      - name: Run AI auto-fix
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_REVIEW_MODEL }}
        run: >
          python -m tools.ai_review.auto_fix apply
          --input .ai/review-payload.json
          --report .ai/final-review.md
          --output .ai/auto-fix.json
          --summary-output .ai/auto-fix-summary.md
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-auto-fix
          path: |
            .ai/auto-fix.json
            .ai/auto-fix-summary.md
          if-no-files-found: warn
      - name: Prepare auto-fix branch
        id: prepare_fix_branch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FIX_BRANCH="ai/auto-fix/${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$FIX_BRANCH"
          git add -A
          git commit -m "chore(ai): 自动修复审查发现的问题"
          git push --force origin "$FIX_BRANCH"
          {
            echo "changed=true"
            echo "fix_branch=$FIX_BRANCH"
          } >> "$GITHUB_OUTPUT"
      - name: Build auto-fix PR body
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        shell: bash
        run: |
          {
            echo "本 PR 由 AI 代码审查 workflow 自动生成，用于修复本次审查中识别出的明确问题。"
            echo
            echo "来源："
            echo "- 仓库：\`${GITHUB_REPOSITORY}\`"
            echo "- 分支：\`${GITHUB_REF_NAME}\`"
            echo "- 提交：\`${GITHUB_SHA}\`"
            echo "- Workflow：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "说明："
            echo "- 仅尝试修复审查报告中有明确证据支持的问题"
            echo "- 不直接修改目标分支"
            echo "- 如果没有生成有效改动，则不会创建 PR"
            echo
            cat .ai/auto-fix-summary.md
          } > .ai/auto-fix-pr-body.md
      - name: Create auto-fix pull request
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        env:
          AI_REVIEW_GH_TOKEN: ${{ secrets.AI_REVIEW_GH_TOKEN }}
          AUTO_FIX_GITHUB_TOKEN: ${{ secrets.AI_AUTOFIX_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          export GITHUB_TOKEN="${AI_REVIEW_GH_TOKEN:-${AUTO_FIX_GITHUB_TOKEN:-$GITHUB_TOKEN}}"
          python -m tools.ai_review.open_fix_pr \
            --title "AI 自动修复: ${{ github.ref_name }} @ ${{ github.sha }}" \
            --body-file .ai/auto-fix-pr-body.md \
            --head "${{ steps.prepare_fix_branch.outputs.fix_branch }}" \
            --base "${{ github.ref_name }}"

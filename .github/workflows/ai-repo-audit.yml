name: AI Repo Audit

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: ai-repo-audit-main
  cancel-in-progress: false

jobs:
  prepare-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - run: python -m tools.ai_review.audit_repo prepare --output .ai/audit-payload.json
      - uses: actions/upload-artifact@v4
        with:
          name: audit-payload
          path: .ai/audit-payload.json

  prepare-mcp-context:
    needs: prepare-snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: audit-payload
          path: .ai
      - name: Build MCP audit context
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_REVIEW_GH_TOKEN: ${{ secrets.AI_REVIEW_GH_TOKEN }}
          AI_REVIEW_ENABLE_MCP: ${{ vars.AI_REVIEW_ENABLE_MCP || 'true' }}
          AI_REVIEW_MCP_MODE: ${{ vars.AI_REVIEW_MCP_MODE || 'prefetch' }}
          AI_REVIEW_MCP_ISSUE_LOOKBACK_DAYS: ${{ vars.AI_REVIEW_MCP_ISSUE_LOOKBACK_DAYS || '30' }}
          AI_REVIEW_MCP_PR_LOOKBACK_DAYS: ${{ vars.AI_REVIEW_MCP_PR_LOOKBACK_DAYS || '30' }}
          AI_REVIEW_MCP_ENABLE_WEB_SEARCH: ${{ vars.AI_REVIEW_MCP_ENABLE_WEB_SEARCH || 'true' }}
        run: python -m tools.ai_review.mcp_context audit --input .ai/audit-payload.json --output .ai/repo-audit-context.json
      - uses: actions/upload-artifact@v4
        with:
          name: audit-context
          path: .ai/repo-audit-context.json
          if-no-files-found: warn

  audit-operations:
    needs:
      - prepare-snapshot
      - prepare-mcp-context
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: audit-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: audit-context
          path: .ai
      - env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_AUDIT_MODEL }}
        run: python -m tools.ai_review.audit_repo review --role operations --input .ai/audit-payload.json --context .ai/repo-audit-context.json --output .ai/audit-operations.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-operations
          path: .ai/audit-operations.json
          if-no-files-found: warn

  audit-code-health:
    needs:
      - prepare-snapshot
      - prepare-mcp-context
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: audit-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: audit-context
          path: .ai
      - env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_AUDIT_MODEL }}
        run: python -m tools.ai_review.audit_repo review --role code-health --input .ai/audit-payload.json --context .ai/repo-audit-context.json --output .ai/audit-code-health.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-code-health
          path: .ai/audit-code-health.json
          if-no-files-found: warn

  audit-workflow-release:
    needs:
      - prepare-snapshot
      - prepare-mcp-context
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: audit-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: audit-context
          path: .ai
      - env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_AUDIT_MODEL }}
        run: python -m tools.ai_review.audit_repo review --role workflow-release --input .ai/audit-payload.json --context .ai/repo-audit-context.json --output .ai/audit-workflow-release.json --strict
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-workflow-release
          path: .ai/audit-workflow-release.json
          if-no-files-found: warn

  audit-coordinator:
    needs:
      - prepare-snapshot
      - prepare-mcp-context
      - audit-operations
      - audit-code-health
      - audit-workflow-release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          path: .ai-artifacts
      - name: Arrange artifact files
        shell: bash
        run: |
          mkdir -p .ai
          cp .ai-artifacts/audit-payload/audit-payload.json .ai/audit-payload.json
          cp .ai-artifacts/audit-context/repo-audit-context.json .ai/repo-audit-context.json
          [ -f .ai-artifacts/audit-operations/audit-operations.json ] && cp .ai-artifacts/audit-operations/audit-operations.json .ai/audit-operations.json || true
          [ -f .ai-artifacts/audit-code-health/audit-code-health.json ] && cp .ai-artifacts/audit-code-health/audit-code-health.json .ai/audit-code-health.json || true
          [ -f .ai-artifacts/audit-workflow-release/audit-workflow-release.json ] && cp .ai-artifacts/audit-workflow-release/audit-workflow-release.json .ai/audit-workflow-release.json || true
      - name: Run audit coordinator
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_AUDIT_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python -m tools.ai_review.audit_repo coordinate
          --input .ai/audit-payload.json
          --context .ai/repo-audit-context.json
          --review .ai/audit-operations.json
          --review .ai/audit-code-health.json
          --review .ai/audit-workflow-release.json
          --output-report .ai/final-audit.md
          --strict
      - name: Build structured repo audit artifact
        if: always()
        run: >
          python -m tools.ai_review.build_audit_artifact audit
          --payload .ai/audit-payload.json
          --context .ai/repo-audit-context.json
          --review .ai/audit-operations.json
          --review .ai/audit-code-health.json
          --review .ai/audit-workflow-release.json
          --report .ai/final-audit.md
          --output .ai/repo-audit.json
      - if: always() && vars.AI_REVIEW_AUDIT_ARTIFACT != 'false' && vars.AI_REVIEW_AUDIT_ARTIFACT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: repo-audit
          path: |
            .ai/repo-audit.json
            .ai/repo-audit-context.json
            .ai/final-audit.md
          if-no-files-found: warn

  validate-auto-fix:
    needs:
      - prepare-snapshot
      - prepare-mcp-context
      - audit-coordinator
    if: always() && needs.prepare-snapshot.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: audit-payload
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: audit-context
          path: .ai
      - name: Download final audit report
        if: needs.audit-coordinator.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: repo-audit
          path: .ai/repo-audit-artifact
      - name: Prepare audit coordinator outputs
        if: needs.audit-coordinator.result == 'success'
        shell: bash
        run: |
          mkdir -p .ai
          [ -f .ai/repo-audit-artifact/final-audit.md ] && cp .ai/repo-audit-artifact/final-audit.md .ai/final-audit.md || true
          [ -f .ai/repo-audit-artifact/repo-audit.json ] && cp .ai/repo-audit-artifact/repo-audit.json .ai/repo-audit.json || true
      - name: Run AI auto-fix for repo audit
        if: needs.audit-coordinator.result == 'success'
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_AUDIT_MODEL }}
        run: >
          python -m tools.ai_review.auto_fix apply
          --input .ai/audit-payload.json
          --context .ai/repo-audit-context.json
          --report .ai/final-audit.md
          --output .ai/auto-fix.json
          --summary-output .ai/auto-fix-summary.md
      - name: Create degraded auto-fix metadata when audit failed
        if: needs.audit-coordinator.result != 'success'
        shell: bash
        run: |
          mkdir -p .ai
          cat > .ai/auto-fix.json <<'JSON'
          {
            "ok": false,
            "changed": false,
            "summary": "自动修复未执行：audit-coordinator 未成功。",
            "root_cause_guess": "",
            "evidence_sources": [],
            "changes": [],
            "changed_files": [],
            "risk_level": "",
            "auto_fix_allowed": false,
            "auto_merge_allowed": false,
            "blocked_reason": "audit-coordinator failed",
            "reason": "audit-coordinator failed",
            "blocked_auto_fix_paths": [],
            "blocked_auto_merge_paths": [],
            "path_policies": [],
            "gates": []
          }
          JSON
          printf "自动修复未执行：audit-coordinator 未成功。\n" > .ai/auto-fix-summary.md
      - name: Validate auto-fix gates
        continue-on-error: true
        run: >
          python -m tools.ai_review.validate_auto_fix run
          --fix .ai/auto-fix.json
          --payload .ai/audit-payload.json
          --output .ai/auto-fix-validation.json
      - name: Upload auto-fix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-auto-fix
          path: |
            .ai/auto-fix.json
            .ai/auto-fix-summary.md
          if-no-files-found: warn
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-auto-fix-validation
          path: .ai/auto-fix-validation.json
          if-no-files-found: warn

  auto-fix:
    needs:
      - prepare-snapshot
      - prepare-mcp-context
      - audit-coordinator
      - validate-auto-fix
    if: always() && needs.prepare-snapshot.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: audit-auto-fix
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: audit-auto-fix-validation
          path: .ai
      - name: Materialize auto-fix changes
        shell: bash
        run: python -m tools.ai_review.auto_fix materialize --input .ai/auto-fix.json
      - name: Prepare auto-fix branch
        id: prepare_fix_branch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FIX_BRANCH="ai/auto-fix/audit-${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$FIX_BRANCH"
          git add -A
          git commit -m "chore(ai): 自动修复 repo audit 发现的问题"
          git push --force origin "$FIX_BRANCH"
          {
            echo "changed=true"
            echo "fix_branch=$FIX_BRANCH"
          } >> "$GITHUB_OUTPUT"
      - name: Prepare PR metadata
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          fix = json.loads(Path('.ai/auto-fix.json').read_text(encoding='utf-8'))
          validation = json.loads(Path('.ai/auto-fix-validation.json').read_text(encoding='utf-8'))
          safe = bool(validation.get('auto_merge_allowed'))
          merge_reason = str(validation.get('reason') or '').strip() or 'Validation did not provide an explicit reason.'
          gates = validation.get('gates') or []
          lines = [
              '## 自动修复上下文',
              f"- 根因猜测: {fix.get('root_cause_guess') or 'n/a'}",
              f"- 证据来源: {', '.join(fix.get('evidence_sources') or []) or 'n/a'}",
              f"- 修改文件数: {len(fix.get('changed_files') or [])}",
              '',
              '## 验证门禁摘要',
              f"- 风险等级: `{validation.get('risk_level', 'unknown')}`",
              f"- 允许自动修复: `{validation.get('auto_fix_allowed', False)}`",
              f"- 允许自动合并: `{safe}`",
              f"- 判定依据: {merge_reason}",
              '',
              '## Gate 明细',
          ]
          if gates:
              for gate in gates:
                  lines.append(
                      f"- `{gate.get('gate_name', 'unknown')}`: `{gate.get('status', 'unknown')}` | required=`{gate.get('required', False)}` | {gate.get('details', '')}"
                  )
          else:
              lines.append('- 无 gate 输出。')
          Path('.ai/safe-to-automerge.txt').write_text(('true' if safe else 'false') + '\n', encoding='utf-8')
          Path('.ai/merge-reason.txt').write_text(merge_reason + '\n', encoding='utf-8')
          Path('.ai/auto-fix-validation-summary.md').write_text('\n'.join(lines).rstrip() + '\n', encoding='utf-8')
          PY
      - name: Build auto-fix PR body
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        shell: bash
        run: |
          {
            echo "本 PR 由 AI 仓库巡检 workflow 自动生成，用于修复本次巡检中识别出的明确问题。"
            echo
            echo "来源："
            echo "- 仓库：\`${GITHUB_REPOSITORY}\`"
            echo "- 分支：\`main\`"
            echo "- 提交：\`${GITHUB_SHA}\`"
            echo "- Workflow：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            cat .ai/auto-fix-summary.md
            echo
            cat .ai/auto-fix-validation-summary.md
          } > .ai/auto-fix-pr-body.md
      - name: Decide merge mode
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        id: decide_merge_mode
        shell: bash
        run: |
          python -c "from pathlib import Path; safe=Path('.ai/safe-to-automerge.txt').read_text(encoding='utf-8').strip().lower() == 'true'; Path('.ai/merge-mode.txt').write_text(('squash' if safe else 'none') + '\n', encoding='utf-8')"
          echo "merge_mode=$(cat .ai/merge-mode.txt)" >> "$GITHUB_OUTPUT"
      - name: Create auto-fix pull request
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        env:
          AI_REVIEW_GH_TOKEN: ${{ secrets.AI_REVIEW_GH_TOKEN }}
          AUTO_FIX_GITHUB_TOKEN: ${{ secrets.AI_AUTOFIX_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          export GITHUB_TOKEN="${AI_REVIEW_GH_TOKEN:-${AUTO_FIX_GITHUB_TOKEN:-$GITHUB_TOKEN}}"
          pr_args=()
          if [ "$(cat .ai/safe-to-automerge.txt)" = "true" ]; then
            pr_args+=(--safe-to-automerge)
          fi
          python -m tools.ai_review.open_fix_pr \
            --title "chore(ai): 自动修复 repo audit @ ${GITHUB_SHA}" \
            --body-file .ai/auto-fix-pr-body.md \
            --head "${{ steps.prepare_fix_branch.outputs.fix_branch }}" \
            --base main \
            --merge-mode "${{ steps.decide_merge_mode.outputs.merge_mode }}" \
            --merge-reason "$(cat .ai/merge-reason.txt)" \
            --json-output .ai/auto-fix-pr.json \
            "${pr_args[@]}"
      - name: Create degraded PR metadata when no branch was pushed
        if: always() && steps.prepare_fix_branch.outputs.changed != 'true'
        shell: bash
        run: |
          cat > .ai/auto-fix-pr.json <<'JSON'
          {
            "ok": true,
            "pr_created": false,
            "pr_number": null,
            "pr_url": "",
            "compare_url": "",
            "merge_requested": false,
            "merge_status": "not_requested",
            "labels": ["automation", "triage"],
            "runtime_fix": false,
            "safe_to_automerge": false,
            "merge_reason": ""
          }
          JSON
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-auto-fix-pr
          path: .ai/auto-fix-pr.json
          if-no-files-found: warn

  publish-audit-issue:
    needs:
      - prepare-snapshot
      - prepare-mcp-context
      - audit-operations
      - audit-code-health
      - audit-workflow-release
      - audit-coordinator
      - validate-auto-fix
      - auto-fix
    if: always() && needs.prepare-snapshot.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          path: .ai-artifacts
      - name: Arrange audit artifacts
        shell: bash
        run: |
          mkdir -p .ai
          cp .ai-artifacts/audit-payload/audit-payload.json .ai/audit-payload.json
          cp .ai-artifacts/audit-context/repo-audit-context.json .ai/repo-audit-context.json
          [ -f .ai-artifacts/audit-operations/audit-operations.json ] && cp .ai-artifacts/audit-operations/audit-operations.json .ai/audit-operations.json || true
          [ -f .ai-artifacts/audit-code-health/audit-code-health.json ] && cp .ai-artifacts/audit-code-health/audit-code-health.json .ai/audit-code-health.json || true
          [ -f .ai-artifacts/audit-workflow-release/audit-workflow-release.json ] && cp .ai-artifacts/audit-workflow-release/audit-workflow-release.json .ai/audit-workflow-release.json || true
          [ -f .ai-artifacts/repo-audit/final-audit.md ] && cp .ai-artifacts/repo-audit/final-audit.md .ai/final-audit.md || true
          [ -f .ai-artifacts/repo-audit/repo-audit.json ] && cp .ai-artifacts/repo-audit/repo-audit.json .ai/repo-audit.json || true
          [ -f .ai-artifacts/audit-auto-fix/auto-fix.json ] && cp .ai-artifacts/audit-auto-fix/auto-fix.json .ai/auto-fix.json || true
          [ -f .ai-artifacts/audit-auto-fix-validation/auto-fix-validation.json ] && cp .ai-artifacts/audit-auto-fix-validation/auto-fix-validation.json .ai/auto-fix-validation.json || true
          [ -f .ai-artifacts/audit-auto-fix-pr/auto-fix-pr.json ] && cp .ai-artifacts/audit-auto-fix-pr/auto-fix-pr.json .ai/auto-fix-pr.json || true
      - name: Build structured repo audit artifact
        run: >
          python -m tools.ai_review.build_audit_artifact audit
          --payload .ai/audit-payload.json
          --context .ai/repo-audit-context.json
          --review .ai/audit-operations.json
          --review .ai/audit-code-health.json
          --review .ai/audit-workflow-release.json
          --report .ai/final-audit.md
          --fix .ai/auto-fix.json
          --validation .ai/auto-fix-validation.json
          --pr .ai/auto-fix-pr.json
          --output .ai/repo-audit.json
      - name: Publish review issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python -m tools.ai_review.publish_review_issue
          --report-file .ai/final-audit.md
          --review-status "${{ needs.audit-coordinator.result }}"
          --auto-fix-status "${{ needs.auto-fix.result }}"
          --audit-file .ai/repo-audit.json
      - if: always() && vars.AI_REVIEW_AUDIT_ARTIFACT != 'false' && vars.AI_REVIEW_AUDIT_ARTIFACT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: repo-audit
          path: |
            .ai/repo-audit.json
            .ai/repo-audit-context.json
            .ai/final-audit.md
          if-no-files-found: warn

name: AI Runtime Debug

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: ai-runtime-debug-main
  cancel-in-progress: false

jobs:
  runtime-debug:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - name: Collect runtime diagnostics
        continue-on-error: true
        run: >
          python -m tools.ai_review.runtime_debug collect
          --output-json .ai/runtime-debug.json
          --output-report .ai/runtime-debug.md
          --output-payload .ai/runtime-debug-payload.json
      - name: Validate runtime diagnostics
        continue-on-error: true
        run: >
          python -m tools.ai_review.validate_runtime run
          --report .ai/runtime-debug.json
          --output .ai/runtime-validation.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-debug
          path: |
            .ai/runtime-debug.json
            .ai/runtime-debug.md
            .ai/runtime-debug-payload.json
            .ai/runtime-validation.json
          if-no-files-found: warn

  prepare-mcp-context:
    needs: runtime-debug
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: runtime-debug
          path: .ai
      - name: Build MCP audit context from runtime payload
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_REVIEW_GH_TOKEN: ${{ secrets.AI_REVIEW_GH_TOKEN }}
          AI_REVIEW_ENABLE_MCP: ${{ vars.AI_REVIEW_ENABLE_MCP || 'true' }}
          AI_REVIEW_MCP_MODE: ${{ vars.AI_REVIEW_MCP_MODE || 'prefetch' }}
          AI_REVIEW_MCP_ISSUE_LOOKBACK_DAYS: ${{ vars.AI_REVIEW_MCP_ISSUE_LOOKBACK_DAYS || '30' }}
          AI_REVIEW_MCP_PR_LOOKBACK_DAYS: ${{ vars.AI_REVIEW_MCP_PR_LOOKBACK_DAYS || '30' }}
          AI_REVIEW_MCP_ENABLE_WEB_SEARCH: ${{ vars.AI_REVIEW_MCP_ENABLE_WEB_SEARCH || 'true' }}
        run: python -m tools.ai_review.mcp_context audit --input .ai/runtime-debug-payload.json --output .ai/runtime-debug-context.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-debug-context
          path: .ai/runtime-debug-context.json
          if-no-files-found: warn

  validate-auto-fix:
    needs:
      - runtime-debug
      - prepare-mcp-context
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: runtime-debug
          path: .ai
      - uses: actions/download-artifact@v4
        with:
          name: runtime-debug-context
          path: .ai
      - name: Run AI auto-fix for runtime diagnostics
        env:
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimaxi.com/v1
          OPENAI_MODEL: ${{ vars.AI_AUDIT_MODEL }}
        run: >
          python -m tools.ai_review.auto_fix apply
          --input .ai/runtime-debug-payload.json
          --context .ai/runtime-debug-context.json
          --report .ai/runtime-debug.md
          --output .ai/auto-fix.json
          --summary-output .ai/auto-fix-summary.md
      - name: Validate auto-fix gates with runtime report
        continue-on-error: true
        run: >
          python -m tools.ai_review.validate_auto_fix run
          --fix .ai/auto-fix.json
          --payload .ai/runtime-debug-payload.json
          --runtime-report .ai/runtime-debug.json
          --output .ai/auto-fix-validation.json
      - name: Upload runtime auto-fix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-auto-fix
          path: |
            .ai/auto-fix.json
            .ai/auto-fix-summary.md
            .ai/auto-fix-validation.json
          if-no-files-found: warn

  auto-fix:
    needs:
      - runtime-debug
      - prepare-mcp-context
      - validate-auto-fix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          name: runtime-auto-fix
          path: .ai
      - name: Materialize auto-fix changes
        shell: bash
        run: python -m tools.ai_review.auto_fix materialize --input .ai/auto-fix.json
      - name: Prepare auto-fix branch
        id: prepare_fix_branch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FIX_BRANCH="ai/auto-fix/runtime-${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$FIX_BRANCH"
          git add -A
          git commit -m "chore(ai): 自动修复 runtime debug 发现的问题"
          git push --force origin "$FIX_BRANCH"
          {
            echo "changed=true"
            echo "fix_branch=$FIX_BRANCH"
          } >> "$GITHUB_OUTPUT"
      - name: Prepare PR metadata
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          fix = json.loads(Path('.ai/auto-fix.json').read_text(encoding='utf-8'))
          validation = json.loads(Path('.ai/auto-fix-validation.json').read_text(encoding='utf-8'))
          safe = bool(validation.get('auto_merge_allowed'))
          merge_reason = str(validation.get('reason') or '').strip() or 'Validation did not provide an explicit reason.'
          gates = validation.get('gates') or []
          lines = [
              '## Runtime 自动修复上下文',
              f"- 根因猜测: {fix.get('root_cause_guess') or 'n/a'}",
              f"- 证据来源: {', '.join(fix.get('evidence_sources') or []) or 'n/a'}",
              f"- 修改文件数: {len(fix.get('changed_files') or [])}",
              '',
              '## 验证门禁摘要',
              f"- 风险等级: `{validation.get('risk_level', 'unknown')}`",
              f"- 允许自动修复: `{validation.get('auto_fix_allowed', False)}`",
              f"- 允许自动合并: `{safe}`",
              f"- 判定依据: {merge_reason}",
              '',
              '## Gate 明细',
          ]
          if gates:
              for gate in gates:
                  lines.append(
                      f"- `{gate.get('gate_name', 'unknown')}`: `{gate.get('status', 'unknown')}` | required=`{gate.get('required', False)}` | {gate.get('details', '')}"
                  )
          else:
              lines.append('- 无 gate 输出。')
          Path('.ai/safe-to-automerge.txt').write_text(('true' if safe else 'false') + '\n', encoding='utf-8')
          Path('.ai/merge-reason.txt').write_text(merge_reason + '\n', encoding='utf-8')
          Path('.ai/auto-fix-validation-summary.md').write_text('\n'.join(lines).rstrip() + '\n', encoding='utf-8')
          PY
      - name: Build auto-fix PR body
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        shell: bash
        run: |
          {
            echo "本 PR 由 AI 运行态诊断 workflow 自动生成，用于修复运行态故障诊断中识别出的明确问题。"
            echo
            echo "来源："
            echo "- 仓库：\`${GITHUB_REPOSITORY}\`"
            echo "- 分支：\`main\`"
            echo "- 提交：\`${GITHUB_SHA}\`"
            echo "- Workflow：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            cat .ai/auto-fix-summary.md
            echo
            cat .ai/auto-fix-validation-summary.md
          } > .ai/auto-fix-pr-body.md
      - name: Decide merge mode
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        id: decide_merge_mode
        shell: bash
        run: |
          python -c "from pathlib import Path; safe=Path('.ai/safe-to-automerge.txt').read_text(encoding='utf-8').strip().lower() == 'true'; Path('.ai/merge-mode.txt').write_text(('squash' if safe else 'none') + '\n', encoding='utf-8')"
          echo "merge_mode=$(cat .ai/merge-mode.txt)" >> "$GITHUB_OUTPUT"
      - name: Create auto-fix pull request
        if: steps.prepare_fix_branch.outputs.changed == 'true'
        env:
          AI_REVIEW_GH_TOKEN: ${{ secrets.AI_REVIEW_GH_TOKEN }}
          AUTO_FIX_GITHUB_TOKEN: ${{ secrets.AI_AUTOFIX_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          export GITHUB_TOKEN="${AI_REVIEW_GH_TOKEN:-${AUTO_FIX_GITHUB_TOKEN:-$GITHUB_TOKEN}}"
          pr_args=(--runtime-fix)
          if [ "$(cat .ai/safe-to-automerge.txt)" = "true" ]; then
            pr_args+=(--safe-to-automerge)
          fi
          python -m tools.ai_review.open_fix_pr \
            --title "chore(ai): 自动修复 runtime debug @ ${GITHUB_SHA}" \
            --body-file .ai/auto-fix-pr-body.md \
            --head "${{ steps.prepare_fix_branch.outputs.fix_branch }}" \
            --base main \
            --merge-mode "${{ steps.decide_merge_mode.outputs.merge_mode }}" \
            --merge-reason "$(cat .ai/merge-reason.txt)" \
            --json-output .ai/auto-fix-pr.json \
            "${pr_args[@]}"
      - name: Create degraded PR metadata when no branch was pushed
        if: always() && steps.prepare_fix_branch.outputs.changed != 'true'
        shell: bash
        run: |
          cat > .ai/auto-fix-pr.json <<'JSON'
          {
            "ok": true,
            "pr_created": false,
            "pr_number": null,
            "pr_url": "",
            "compare_url": "",
            "merge_requested": false,
            "merge_status": "not_requested",
            "labels": ["automation", "triage", "runtime-fix"],
            "runtime_fix": true,
            "safe_to_automerge": false,
            "merge_reason": ""
          }
          JSON
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-auto-fix-pr
          path: .ai/auto-fix-pr.json
          if-no-files-found: warn

  publish-runtime-issue:
    needs:
      - runtime-debug
      - prepare-mcp-context
      - validate-auto-fix
      - auto-fix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip openai pyyaml uv
      - uses: actions/download-artifact@v4
        with:
          path: .ai-artifacts
      - name: Arrange runtime artifacts
        shell: bash
        run: |
          mkdir -p .ai
          cp .ai-artifacts/runtime-debug/runtime-debug-payload.json .ai/runtime-debug-payload.json
          cp .ai-artifacts/runtime-debug/runtime-debug.json .ai/runtime-debug.json
          cp .ai-artifacts/runtime-debug/runtime-debug.md .ai/runtime-debug.md
          [ -f .ai-artifacts/runtime-debug/runtime-validation.json ] && cp .ai-artifacts/runtime-debug/runtime-validation.json .ai/runtime-validation.json || true
          [ -f .ai-artifacts/runtime-debug-context/runtime-debug-context.json ] && cp .ai-artifacts/runtime-debug-context/runtime-debug-context.json .ai/runtime-debug-context.json || true
          [ -f .ai-artifacts/runtime-auto-fix/auto-fix.json ] && cp .ai-artifacts/runtime-auto-fix/auto-fix.json .ai/auto-fix.json || true
          [ -f .ai-artifacts/runtime-auto-fix/auto-fix-summary.md ] && cp .ai-artifacts/runtime-auto-fix/auto-fix-summary.md .ai/auto-fix-summary.md || true
          [ -f .ai-artifacts/runtime-auto-fix/auto-fix-validation.json ] && cp .ai-artifacts/runtime-auto-fix/auto-fix-validation.json .ai/auto-fix-validation.json || true
          [ -f .ai-artifacts/runtime-auto-fix-pr/auto-fix-pr.json ] && cp .ai-artifacts/runtime-auto-fix-pr/auto-fix-pr.json .ai/auto-fix-pr.json || true
      - name: Create degraded runtime metadata when missing
        shell: bash
        run: |
          [ -f .ai/runtime-debug-context.json ] || printf '{}\n' > .ai/runtime-debug-context.json
          [ -f .ai/runtime-validation.json ] || printf '{"ok": false, "reason": "runtime validation missing", "gates": []}\n' > .ai/runtime-validation.json
          [ -f .ai/auto-fix.json ] || printf '{"ok": false, "changed": false, "changed_files": [], "risk_level": "", "auto_fix_allowed": false, "auto_merge_allowed": false, "blocked_reason": "runtime auto-fix missing", "reason": "runtime auto-fix missing", "gates": []}\n' > .ai/auto-fix.json
          [ -f .ai/auto-fix-validation.json ] || printf '{"ok": false, "risk_level": "", "auto_fix_allowed": false, "auto_merge_allowed": false, "reason": "runtime auto-fix validation missing", "gates": []}\n' > .ai/auto-fix-validation.json
          [ -f .ai/auto-fix-pr.json ] || printf '{"ok": true, "pr_created": false, "pr_number": null, "pr_url": "", "compare_url": "", "merge_requested": false, "merge_status": "not_requested", "labels": ["automation", "triage", "runtime-fix"], "runtime_fix": true, "safe_to_automerge": false, "merge_reason": ""}\n' > .ai/auto-fix-pr.json
      - name: Build structured runtime audit artifact
        run: >
          python -m tools.ai_review.build_audit_artifact runtime
          --payload .ai/runtime-debug-payload.json
          --context .ai/runtime-debug-context.json
          --report .ai/runtime-debug.md
          --fix .ai/auto-fix.json
          --validation .ai/auto-fix-validation.json
          --pr .ai/auto-fix-pr.json
          --runtime-validation .ai/runtime-validation.json
          --output .ai/runtime-audit.json
      - name: Publish runtime issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python -m tools.ai_review.publish_review_issue
          --mode runtime
          --report-file .ai/runtime-debug.md
          --review-status "${{ needs.runtime-debug.result }}"
          --auto-fix-status "${{ needs.auto-fix.result }}"
          --audit-file .ai/runtime-audit.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-audit
          path: |
            .ai/runtime-audit.json
            .ai/runtime-debug-context.json
            .ai/runtime-debug.md
            .ai/runtime-validation.json
          if-no-files-found: warn

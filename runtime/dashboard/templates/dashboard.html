<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP Futures Dashboard - Real-time K-Line</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        :root {
            --bg-deep: #07080a;
            --bg-panel: #0d1117;
            --bg-card: #111820;
            --bg-hover: #1a2332;
            --border: #1e2a3a;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-blue: #58a6ff;
            --accent-yellow: #f0c040;
            --accent-purple: #bc8cff;
            --glow-green: rgba(0, 255, 136, 0.15);
            --glow-red: rgba(255, 51, 102, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans SC', 'JetBrains Mono', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-size: 13px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 56px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--bg-deep);
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent-green);
        }

        .current-contract {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-left: 24px;
            border-left: 1px solid var(--border);
        }

        .contract-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-yellow);
        }

        .contract-name {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .price-display {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .price-main {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 600;
        }

        .price-main.up { color: var(--accent-green); }
        .price-main.down { color: var(--accent-red); }

        .price-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .price-change.up {
            background: var(--glow-green);
            color: var(--accent-green);
        }
        .price-change.down {
            background: var(--glow-red);
            color: var(--accent-red);
        }

        .contract-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: var(--accent-red);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Panel - Instrument List */
        .left-panel {
            width: 280px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .search-box {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .exchange-groups {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .exchange-group {
            margin-bottom: 4px;
        }

        .exchange-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .exchange-header:hover {
            background: var(--bg-hover);
        }

        .exchange-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 12px;
        }

        .exchange-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .exchange-badge.shfe { background: rgba(88, 166, 255, 0.2); color: var(--accent-blue); }
        .exchange-badge.dce { background: rgba(0, 255, 136, 0.2); color: var(--accent-green); }
        .exchange-badge.czce { background: rgba(255, 192, 64, 0.2); color: var(--accent-yellow); }
        .exchange-badge.cffex { background: rgba(188, 140, 255, 0.2); color: var(--accent-purple); }
        .exchange-badge.ine { background: rgba(255, 51, 102, 0.2); color: var(--accent-red); }

        .exchange-count {
            font-size: 11px;
            color: var(--text-muted);
        }

        .exchange-toggle {
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .exchange-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .instrument-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .instrument-list.expanded {
            max-height: 2000px;
        }

        .instrument-item {
            display: flex;
            align-items: center;
            padding: 6px 12px 6px 24px;
            cursor: pointer;
            transition: background 0.1s;
            border-left: 2px solid transparent;
        }

        .instrument-item:hover {
            background: var(--bg-hover);
        }

        .instrument-item.selected {
            background: var(--bg-hover);
            border-left-color: var(--accent-blue);
        }

        .instrument-item.up {
            border-left-color: var(--accent-green);
        }

        .instrument-item.down {
            border-left-color: var(--accent-red);
        }

        .inst-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            width: 80px;
        }

        .inst-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            flex: 1;
            text-align: right;
        }

        .inst-price.up { color: var(--accent-green); }
        .inst-price.down { color: var(--accent-red); }

        .inst-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            width: 60px;
            text-align: right;
        }

        .inst-change.up { color: var(--accent-green); }
        .inst-change.down { color: var(--accent-red); }

        /* Right Panel - Chart */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .period-selector {
            display: flex;
            gap: 4px;
        }

        .period-btn {
            padding: 4px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'JetBrains Mono', monospace;
        }

        .period-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        .period-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: var(--bg-deep);
        }

        .chart-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .chart-container {
            flex: 1;
            padding: 8px;
            background: var(--bg-deep);
        }

        #kline-chart {
            width: 100%;
            height: 100%;
        }

        /* No data placeholder */
        .no-data {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 12px;
        }

        .no-data-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .no-data-text {
            font-size: 14px;
        }

        /* Loading state */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 8, 10, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .loading-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Connecting to market data...</div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">CT</div>
                    <div class="logo-text">Futures<span>Hub</span></div>
                </div>
                <div class="current-contract" id="current-contract">
                    <div>
                        <div class="contract-symbol" id="contract-symbol">--</div>
                        <div id="chart-instrument" style="display:none"></div>
                        <div class="contract-name" id="contract-name">Select a contract</div>
                    </div>
                    <div class="price-display" id="price-display" style="display:none;">
                        <span class="price-main" id="price-main">--</span>
                        <span class="price-change up" id="price-change">--</span>
                    </div>
                    <div class="contract-stats" id="contract-stats" style="display:none;">
                        <div class="stat-item">
                            <span class="stat-label">Volume</span>
                            <span class="stat-value" id="stat-volume">--</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Open Interest</span>
                            <span class="stat-value" id="stat-oi">--</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Bid</span>
                            <span class="stat-value" id="stat-bid">--</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Ask</span>
                            <span class="stat-value" id="stat-ask">--</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="connection-status">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel - Instruments -->
            <aside class="left-panel">
                <div class="search-box">
                    <input type="text" class="search-input" id="search-input" placeholder="Search contracts... (cu2605, if...)">
                </div>
                <div class="exchange-groups" id="exchange-groups">
                    <!-- Dynamically populated -->
                </div>
            </aside>

            <!-- Right Panel - Chart -->
            <main class="right-panel">
                <div class="chart-toolbar">
                    <div class="period-selector">
                        <button class="period-btn" data-period="1min">1M</button>
                        <button class="period-btn" data-period="5min">5M</button>
                        <button class="period-btn" data-period="15min">15M</button>
                        <button class="period-btn active" data-period="30min">30M</button>
                        <button class="period-btn" data-period="1hour">1H</button>
                        <button class="period-btn" data-period="1day">1D</button>
                    </div>
                    <div class="chart-info">
                        <span id="chart-candles">0 candles</span>
                        <span>|</span>
                        <span id="chart-range">--</span>
                    </div>
                </div>
                <div class="chart-container">
                    <div id="kline-chart"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/js/charts.js"></script>
</body>
</html>
